version: '3.8'

services:
  user-service:
    image: denmach-kirill/user-service:latest
    ports:
      - "3001:3001"
    deploy:
      replicas: 1

  info-service:
    image: denmach-kirill/info-service:latest
    ports:
      - "3002:3002"
    deploy:
      replicas: 1

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service
      - info-service
    deploy:
      replicas: 1
